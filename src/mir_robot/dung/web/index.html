<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
  <title>Menu Robot MiR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="./vendor/roslib.min.js"></script>
</head>
<body class="h-[100dvh] overflow-auto text-slate-800 relative" style="font-family: 'Noto Sans', 'Segoe UI', Roboto, Arial, sans-serif;">
  <div class="fixed inset-0 z-0 bg-center bg-cover" style="background-image: url('./assets/nen.png'); filter: saturate(65%) brightness(88%);"></div>
  <div class="fixed inset-0 z-0 bg-white/55"></div>

  <div class="relative z-10 w-full max-w-[1800px] mx-auto p-0 min-h-[100dvh] lg:h-[100dvh] flex flex-col">
    <header class="bg-[#a30f2d] border-b border-[#a30f2d] px-5 md:px-7 py-4 md:py-5">
      <div class="flex items-start justify-between gap-4 md:gap-5">
        <div class="flex items-center gap-4 md:gap-5">
          <img src="./assets/logo.png" alt="Logo HUST" class="w-16 h-16 md:w-24 md:h-24 object-contain" />
          <div>
            <h1 class="text-2xl md:text-4xl font-extrabold tracking-tight text-white">HUST - Đặt món Robot MiR</h1>
            <p id="table-indicator" class="text-base md:text-lg font-semibold text-rose-100 mt-1"></p>
            <p id="table-warning" class="hidden text-sm text-yellow-200 mt-1"></p>
          </div>
        </div>

        <div class="flex flex-col items-end gap-2">
          <div id="ros-status" class="inline-flex items-center gap-2 px-3 py-2 rounded-full bg-slate-200 text-slate-700 text-sm md:text-base font-semibold whitespace-nowrap">
            <span id="ros-status-dot" class="w-2.5 h-2.5 rounded-full bg-slate-500"></span>
            <span id="ros-status-text">Chưa kết nối ROSBridge</span>
          </div>
          <div id="robot-status" class="inline-flex items-center gap-2 px-3 py-2 rounded-full bg-slate-200 text-slate-700 text-sm md:text-base font-semibold whitespace-nowrap">
            <span id="robot-status-dot" class="w-2.5 h-2.5 rounded-full bg-slate-500"></span>
            <span id="robot-status-text">Robot thật: chưa kết nối</span>
          </div>
        </div>
      </div>
    </header>

    <main class="grid lg:grid-cols-12 gap-0 flex-1 min-h-0">
      <section class="lg:col-span-2 bg-white/18 border-r border-white/30 h-full flex flex-col min-h-0 overflow-hidden backdrop-blur-[1px]">
        <h2 class="text-base md:text-lg font-bold text-[#2f3f58] px-4 py-3 bg-white border-y border-[#d8dee8]">Danh mục</h2>
        <div id="category-list" class="flex-1 overflow-y-auto"></div>
      </section>

      <section class="lg:col-span-7 bg-white/12 border-r border-white/30 p-4 md:p-5 h-full flex flex-col min-h-0 backdrop-blur-[1px]">
        <div id="menu-grid" class="grid sm:grid-cols-2 xl:grid-cols-3 gap-3 flex-1 overflow-y-auto pr-1 content-start"></div>
      </section>

      <aside class="lg:col-span-3 bg-white p-4 md:p-5 h-full flex flex-col min-h-0">
        <h2 id="cart-title" class="text-xl md:text-2xl font-bold text-[#2f3f58]">Giỏ hàng (Bàn 1)</h2>
        <ul id="cart-items" class="space-y-3 mt-4 flex-1 overflow-y-auto pr-1"></ul>

        <div class="border-t border-[#d8dee8] mt-4 pt-4">
          <div class="flex justify-between font-bold text-xl text-[#2f3f58]">
            <span>Tổng tiền</span>
            <span id="total-price" class="text-[#a30f2d]">0đ</span>
          </div>

          <button id="btn-pay" class="w-full mt-4 py-4 rounded-xl bg-[#c21734] text-white text-lg font-bold hover:bg-[#a30f2d]">THANH TOÁN</button>
          <p id="payment-status" class="text-base text-[#6a7485] mt-2"></p>
        </div>
      </aside>
    </main>
  </div>

  <div id="qr-overlay" class="hidden fixed inset-0 bg-black/60 z-50 items-center justify-center p-4">
    <div class="bg-white rounded-2xl p-6 w-full max-w-xl text-center border border-[#d8dee8]">
      <p class="text-2xl font-bold text-[#a30f2d]">Quét QR để thanh toán</p>
      <img id="qr-img" src="" alt="VietQR" class="mx-auto mt-3 border rounded-xl p-2 w-[min(78vw,420px)] h-[min(78vw,420px)] object-contain" />
      <div class="mt-4 flex justify-center gap-2">
        <button id="btn-confirm" class="px-4 py-2 rounded-xl bg-[#c21734] text-white font-semibold">Xác nhận đã thanh toán</button>
        <button id="btn-cancel" class="px-4 py-2 rounded-xl bg-slate-200 text-slate-700 font-semibold">Hủy</button>
      </div>
    </div>
  </div>

  <script>
    const DEFAULT_TABLE_NO = 1;
    const MAX_TABLE_NO = 4;

    function resolveRosUrls() {
      const params = new URLSearchParams(window.location.search);
      const rosParam = params.get('ros') || params.get('rosbridge');
      if (rosParam && /^wss?:\/\//i.test(rosParam.trim())) {
        return [rosParam.trim()];
      }

      const urls = [];
      const pushUnique = (url) => {
        if (url && !urls.includes(url)) urls.push(url);
      };

      const host = window.location.hostname;
      if (host) {
        const wsProtocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
        pushUnique(`${wsProtocol}://${host}:9090`);
        if (wsProtocol !== 'ws') {
          pushUnique(`ws://${host}:9090`);
        }
      }

      pushUnique('ws://localhost:9090');
      pushUnique('ws://127.0.0.1:9090');
      pushUnique('ws://192.168.0.102:9090');

      return urls;
    }

    const ROS_URLS = resolveRosUrls();

    const CATEGORIES = [
      { key: 'food', label: 'Món ăn', icon: '🍱' },
      { key: 'drink', label: 'Nước uống', icon: '🥤' }
    ];

    const MENU = {
      food: [],
      drink: [
        { name: 'Lavie', price: 36000, image: './assets/lavie.png' },
        { name: 'Coca Cola', price: 36000, image: './assets/cocacola.png' }
      ]
    };

    const PAYMENT = {
      bank: 'vcb',
      accountNo: '9865891262',
      accountName: 'LE TIEN DUNG'
    };

    let ros = null;
    let orderTopic = null;
    let rosConnected = false;
    let rosUrlIndex = 0;
    let reconnectTimer = null;
    let robotStatusSub = null;
    let robotStatusTimer = null;
    let robotLastSeenAt = 0;
    let cart = [];
    let activeCategory = 'food';
    const RECONNECT_DELAY_MS = 3000;
    const ROBOT_HEARTBEAT_TIMEOUT_MS = 8000;

    function scheduleReconnect() {
      if (reconnectTimer) return;
      reconnectTimer = setTimeout(() => {
        reconnectTimer = null;
        connectRos();
      }, RECONNECT_DELAY_MS);
    }

    function parseTableConfigFromUrl() {
      const params = new URLSearchParams(window.location.search);
      const tableParam = params.get('ban');

      if (tableParam === null || tableParam.trim() === '') {
        return { tableNo: DEFAULT_TABLE_NO, invalid: false, raw: null };
      }

      const parsed = Number(tableParam);
      if (Number.isInteger(parsed) && parsed >= 1 && parsed <= MAX_TABLE_NO) {
        return { tableNo: parsed, invalid: false, raw: tableParam };
      }

      return { tableNo: DEFAULT_TABLE_NO, invalid: true, raw: tableParam };
    }

    const TABLE_CONFIG = parseTableConfigFromUrl();
    const TABLE_NO = TABLE_CONFIG.tableNo;

    function money(v) {
      return v.toLocaleString('vi-VN') + 'đ';
    }

    function setStatus(text, type = 'idle') {
      const el = document.getElementById('ros-status');
      const dotEl = document.getElementById('ros-status-dot');
      const textEl = document.getElementById('ros-status-text');
      if (!el) return;
      if (textEl) textEl.textContent = text;
      el.className = 'inline-flex items-center gap-2 px-3 py-2 rounded-full text-sm md:text-base font-semibold whitespace-nowrap';

      if (type === 'ok') {
        el.classList.add('bg-emerald-100', 'text-emerald-700');
        if (dotEl) dotEl.className = 'w-2.5 h-2.5 rounded-full bg-emerald-500';
      } else if (type === 'err') {
        el.classList.add('bg-[#fde8ee]', 'text-[#a30f2d]');
        if (dotEl) dotEl.className = 'w-2.5 h-2.5 rounded-full bg-[#a30f2d]';
      } else {
        el.classList.add('bg-slate-200', 'text-slate-700');
        if (dotEl) dotEl.className = 'w-2.5 h-2.5 rounded-full bg-slate-500';
      }
    }

    function setRobotStatus(text, type = 'idle') {
      const el = document.getElementById('robot-status');
      const dotEl = document.getElementById('robot-status-dot');
      const textEl = document.getElementById('robot-status-text');
      if (!el) return;
      if (textEl) textEl.textContent = text;
      el.className = 'inline-flex items-center gap-2 px-3 py-2 rounded-full text-sm md:text-base font-semibold whitespace-nowrap';

      if (type === 'ok') {
        el.classList.add('bg-emerald-100', 'text-emerald-700');
        if (dotEl) dotEl.className = 'w-2.5 h-2.5 rounded-full bg-emerald-500';
      } else if (type === 'err') {
        el.classList.add('bg-[#fde8ee]', 'text-[#a30f2d]');
        if (dotEl) dotEl.className = 'w-2.5 h-2.5 rounded-full bg-[#a30f2d]';
      } else {
        el.classList.add('bg-slate-200', 'text-slate-700');
        if (dotEl) dotEl.className = 'w-2.5 h-2.5 rounded-full bg-slate-500';
      }
    }

    function stopRobotMonitor() {
      if (robotStatusSub) {
        try { robotStatusSub.unsubscribe(); } catch (_) {}
        robotStatusSub = null;
      }
      if (robotStatusTimer) {
        clearInterval(robotStatusTimer);
        robotStatusTimer = null;
      }
      robotLastSeenAt = 0;
    }

    function startRobotMonitor() {
      stopRobotMonitor();
      if (!rosConnected || !ros) {
        setRobotStatus('Robot thật: chưa kết nối', 'idle');
        return;
      }

      setRobotStatus('Robot thật: đang chờ dữ liệu...', 'idle');
      robotStatusSub = new ROSLIB.Topic({
        ros,
        name: '/mir_status_msg',
        messageType: 'std_msgs/String'
      });

      robotStatusSub.subscribe(() => {
        robotLastSeenAt = Date.now();
        setRobotStatus('Robot thật: đã kết nối', 'ok');
      });

      robotStatusTimer = setInterval(() => {
        if (!rosConnected) {
          setRobotStatus('Robot thật: chưa kết nối', 'idle');
          return;
        }

        if (robotLastSeenAt === 0) {
          setRobotStatus('Robot thật: đang chờ dữ liệu...', 'idle');
          return;
        }

        if (Date.now() - robotLastSeenAt > ROBOT_HEARTBEAT_TIMEOUT_MS) {
          setRobotStatus('Robot thật: mất kết nối', 'err');
        }
      }, 1000);
    }

    function connectRos() {
      const url = ROS_URLS[rosUrlIndex % ROS_URLS.length];
      if (!url) return;
      if (!window.ROSLIB) {
        setStatus('Thiếu roslibjs', 'err');
        return;
      }

      try {
        if (ros) {
          try { ros.close(); } catch (_) {}
        }
        setStatus(`Đang kết nối ROSBridge (${url})...`);

        ros = new ROSLIB.Ros({ url });
        ros.on('connection', () => {
          rosConnected = true;
          if (reconnectTimer) {
            clearTimeout(reconnectTimer);
            reconnectTimer = null;
          }
          setStatus(`Đã kết nối ROSBridge (${url})`, 'ok');
          startRobotMonitor();
        });
        ros.on('error', (e) => {
          rosConnected = false;
          console.log('ROS error', e);
          setStatus(`Lỗi kết nối ROSBridge (${url})`, 'err');
          stopRobotMonitor();
          setRobotStatus('Robot thật: chưa kết nối', 'idle');
          if (ROS_URLS.length > 1) {
            rosUrlIndex = (rosUrlIndex + 1) % ROS_URLS.length;
          }
          scheduleReconnect();
        });
        ros.on('close', () => {
          rosConnected = false;
          setStatus('Đã ngắt ROSBridge');
          stopRobotMonitor();
          setRobotStatus('Robot thật: chưa kết nối', 'idle');
          scheduleReconnect();
        });

        const arrivedTopic = new ROSLIB.Topic({
          ros,
          name: "/robot_arrived_table",
          messageType: "std_msgs/String"
        });
        arrivedTopic.subscribe((msg) => {
          try {
            const data = JSON.parse(msg.data);
            if (data.action === "popup_menu" && data.ban) {
              const banId = data.ban.replace(/[^0-9]/g, "");
              if (banId) {
                window.location.href = "?ban=" + banId;
              }
            }
          } catch(e) {}
        });

        orderTopic = new ROSLIB.Topic({
          ros,
          name: '/robot_orders',
          messageType: 'std_msgs/String'
        });
      } catch (e) {
        rosConnected = false;
        setStatus('Không thể khởi tạo ROS', 'err');
        console.log(e);
      }
    }

    function tableNo() {
      return TABLE_NO;
    }

    function renderTableInfo() {
      const indicatorEl = document.getElementById('table-indicator');
      if (indicatorEl) {
        indicatorEl.textContent = `Đang phục vụ: Bàn ${tableNo()}`;
      }

      const warningEl = document.getElementById('table-warning');
      if (!warningEl) return;

      if (TABLE_CONFIG.invalid) {
        warningEl.textContent = `Bàn "${TABLE_CONFIG.raw}" không hợp lệ, đã chuyển về bàn ${DEFAULT_TABLE_NO}.`;
        warningEl.classList.remove('hidden');
      } else {
        warningEl.classList.add('hidden');
      }
    }

    function renderMenu() {
      const list = MENU[activeCategory] || [];
      const grid = document.getElementById('menu-grid');
      const menuTitle = document.getElementById('menu-title');
      const category = CATEGORIES.find(c => c.key === activeCategory);
      if (menuTitle) menuTitle.textContent = category ? category.label : 'Danh sách món';

      grid.innerHTML = list.map(m => `
        <button class="text-left border border-[#d8dee8] rounded-xl p-4 bg-white hover:bg-[#f7f9fc] min-h-[260px]" onclick="addItem('${m.name}', ${m.price})">
          <div class="relative w-full h-44 flex items-center justify-center">
            ${m.image
              ? `<img src="${m.image}" alt="${m.name}" class="w-full h-full object-contain drop-shadow-sm" />`
              : `<span class="text-5xl">${m.icon || '🍽️'}</span>`}
            <div class="absolute top-2 right-2 text-sm font-semibold text-white bg-[#a30f2d] px-2.5 py-1 rounded">${money(m.price)}</div>
          </div>
          <div class="font-semibold text-lg mt-3 leading-tight text-[#2f3f58]">${m.name}</div>
        </button>
      `).join('');
    }

    function renderCategories() {
      const wrap = document.getElementById('category-list');
      if (!wrap) return;

      wrap.innerHTML = CATEGORIES.map((c, idx) => {
        const activeClass = c.key === activeCategory
          ? 'bg-[#a30f2d] text-white'
          : 'bg-white text-[#2f3f58] hover:bg-[#f5f7fb]';

        const rowBorderClass = idx === 0 ? 'border-y border-[#e5e9f0]' : 'border-b border-[#e5e9f0]';

        return `
          <button onclick="setCategory('${c.key}')" class="w-full text-left px-4 py-6 md:py-7 font-semibold min-h-[120px] ${rowBorderClass} ${activeClass}">
            <div class="flex flex-col items-center justify-center gap-2 text-center">
              <span class="text-4xl md:text-5xl leading-none">${c.icon}</span>
              <span class="text-base md:text-lg leading-tight">${c.label}</span>
            </div>
          </button>
        `;
      }).join('');
    }

    function setCategory(categoryKey) {
      activeCategory = categoryKey;
      renderCategories();
      renderMenu();
    }

    function addItem(name, price) {
      const item = cart.find(i => i.name === name && i.price === price);
      if (item) item.qty += 1;
      else cart.push({ name, price, qty: 1 });
      renderCart();
    }

    function inc(index) {
      if (!cart[index]) return;
      cart[index].qty += 1;
      renderCart();
    }

    function dec(index) {
      if (!cart[index]) return;
      cart[index].qty -= 1;
      if (cart[index].qty <= 0) cart.splice(index, 1);
      renderCart();
    }

    function totalPrice() {
      return cart.reduce((sum, i) => sum + i.price * i.qty, 0);
    }

    function renderCart() {
      document.getElementById('cart-title').textContent = `Giỏ hàng (Bàn ${tableNo()})`;
      const ul = document.getElementById('cart-items');
      ul.innerHTML = cart.map((i, idx) => {
        const line = i.price * i.qty;
        return `
          <li class="border border-[#d8dee8] rounded-xl p-4 bg-white">
            <div class="flex justify-between items-start">
              <div>
                <p class="font-semibold text-lg leading-tight text-[#2f3f58]">${i.name}</p>
                <p class="text-base text-[#6a7485]">${money(i.price)} / món</p>
              </div>
              <p class="font-semibold text-lg text-[#2f3f58]">${money(line)}</p>
            </div>
            <div class="mt-3 flex items-center gap-2">
              <button onclick="dec(${idx})" class="w-9 h-9 bg-white border border-[#d8dee8] rounded text-[#a30f2d] text-lg font-bold">-</button>
              <span class="min-w-9 text-center text-lg font-bold">${i.qty}</span>
              <button onclick="inc(${idx})" class="w-9 h-9 bg-white border border-[#d8dee8] rounded text-[#a30f2d] text-lg font-bold">+</button>
            </div>
          </li>
        `;
      }).join('');

      document.getElementById('total-price').textContent = money(totalPrice());
    }

    function openQr() {
      if (cart.length === 0) {
        alert('Giỏ hàng đang trống');
        return;
      }
      const amount = totalPrice();
      const desc = encodeURIComponent(`ThanhToan_Ban${tableNo()}`);
      const accountName = encodeURIComponent(PAYMENT.accountName);
      const src = `https://img.vietqr.io/image/${PAYMENT.bank}-${PAYMENT.accountNo}-compact2.png?amount=${amount}&addInfo=${desc}&accountName=${accountName}`;
      document.getElementById('qr-img').src = src;
      document.getElementById('payment-status').textContent = `Đang chờ xác nhận thanh toán cho bàn ${tableNo()}...`;
      document.getElementById('qr-overlay').classList.remove('hidden');
      document.getElementById('qr-overlay').classList.add('flex');
    }

    function closeQr() {
      document.getElementById('qr-overlay').classList.add('hidden');
      document.getElementById('qr-overlay').classList.remove('flex');
    }

    function confirmPaid() {
      const order = {
        ban: tableNo(),
        tong_tien: totalPrice(),
        danh_sach_mon: cart.flatMap(i => Array(i.qty).fill(i.name))
      };

      if (orderTopic && rosConnected) {
        orderTopic.publish(new ROSLIB.Message({ data: JSON.stringify(order) }));
        document.getElementById('payment-status').textContent = `Đã gửi đơn bàn ${tableNo()} lên robot thành công.`;
      } else {
        document.getElementById('payment-status').textContent = `Bàn ${tableNo()}: chưa kết nối ROSBridge, chưa gửi đơn.`;
      }

      cart = [];
      renderCart();
      closeQr();
    }

    document.getElementById('btn-pay').addEventListener('click', openQr);
    document.getElementById('btn-confirm').addEventListener('click', confirmPaid);
    document.getElementById('btn-cancel').addEventListener('click', closeQr);

    renderTableInfo();
    renderCategories();
    renderMenu();
    renderCart();
    connectRos();
  </script>
</body>
</html>
